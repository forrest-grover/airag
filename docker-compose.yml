services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./.volumes/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./.volumes/models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model-id Qwen/Qwen3-Embedding-0.6B --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./.volumes/models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model-id Alibaba-NLP/gte-reranker-modernbert-base --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
