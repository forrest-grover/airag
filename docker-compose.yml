services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.volumes/qdrant:/qdrant/storage

  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    ports:
      - "8081:80"
    volumes:
      - ./.volumes/models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model-id Qwen/Qwen3-Embedding-0.6B --port 80

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    ports:
      - "8082:80"
    volumes:
      - ./.volumes/models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model-id Alibaba-NLP/gte-reranker-modernbert-base --port 80
